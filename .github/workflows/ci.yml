name: CI

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    test:
        name: Build, lint, and test
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: express
                    POSTGRES_PASSWORD: 1234
                    POSTGRES_DB: express_crud_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U express -d express_crud_test"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        env:
            TEST_DATABASE_URL: postgres://express:1234@localhost:5432/express_crud_test

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run linter
              run: npm run lint

            - name: Build project
              run: npm run build

            - name: Run unit and smoke tests
              run: npm run test:unit

            - name: Run integration tests
              run: npm run test:integration:run
